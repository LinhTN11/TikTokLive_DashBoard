services:
  - type: web
    name: tiktok-live-overlay
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:live:check && npm run build:live
    startCommand: npm run db:live:apply && npm run start:live
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-live-overlay-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: EULER_API_KEY
        sync: false

databases:
  - name: tiktok-live-overlay-db
    databaseName: tiktok_live_overlay
    user: tiktok_live_overlay
    plan: free
