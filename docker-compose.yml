services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiktok_live_overlay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - live_overlay_postgres:/var/lib/postgresql/data
      - ./apps/live-overlay/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  live-overlay:
    build: .
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tiktok_live_overlay
      DATABASE_SSL: "false"
      EULER_API_KEY: ${EULER_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  live_overlay_postgres:
